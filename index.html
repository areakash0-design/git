<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ekart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🛒 Ekart</h1>
    <div class="cart">Cart: <span id="cart-count">0</span></div>
</header>

<section class="products">

    <div class="product">
        <h3>Phone</h3>
        <p>₹10,000</p>
        <button onclick="addToCart('Phone')">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Laptop</h3>
        <p>₹50,000</p>
        <button onclick="addToCart('Laptop')">Add to Cart</button>
    </div>

    <div class="product">
        <h3>Headphones</h3>
        <p>₹2,000</p>
        <button onclick="addToCart('Headphones')">Add to Cart</button>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
